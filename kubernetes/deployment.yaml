apiVersion: apps/v1
kind: Deployment

metadata:
  name: pedidos-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: pedidos

  template:
    metadata:
      labels:
        app: pedidos

    spec:
      containers:
      - name: pedidos

        image: mariayamaguti/pedidos-service:v1

        ports:
        - containerPort: 3001

        readinessProbe:
          httpGet:
            path: /
            port: 3001

        livenessProbe:
          httpGet:
            path: /
            port: 3001